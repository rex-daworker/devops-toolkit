name: Lint Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on scripts
        run: |
          echo "Running flake8 linter..."
          # Only lint python files if any exist
          if find . -name "*.py" | grep -q .; then
            flake8 . --count --max-line-length=100 --statistics
          else
            echo "No Python files found — skipping lint"
          fi

      - name: Check shell scripts exist
        run: |
          echo "Scripts in repo:"
          ls scripts/
          echo "✅ Pipeline complete"
