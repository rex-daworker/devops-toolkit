<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex Oghenerobo | DevOps Engineer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
        }
        h1 { font-size: 2.5rem; margin-bottom: 8px; }
        .subtitle { color: #8ecae6; font-size: 1.2rem; margin-bottom: 30px; }
        .skills { display: grid; gap: 15px; margin-bottom: 30px; }
        .skill {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 3px solid #8ecae6;
        }
        .btn {
            display: inline-block;
            background: #8ecae6;
            color: #1e3c72;
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .footer { margin-top: 30px; color: rgba(255,255,255,0.5); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Rex Oghenerobo</h1>
        <p class="subtitle">DevOps Engineer</p>
        <div class="skills">
            <div class="skill">🛠️ Linux Automation & Bash Scripting</div>
            <div class="skill">☁️ AWS Cloud Infrastructure (EC2, S3, IAM)</div>
            <div class="skill">🌍 Terraform — Infrastructure as Code</div>
            <div class="skill">🔁 CI/CD Pipelines with GitHub Actions</div>
            <div class="skill">🐳 Docker & Containers</div>
            <div class="skill">📊 Monitoring & Alerting Systems</div>
        </div>
        <a class="btn" href="https://github.com/rex-daworker/devops-toolkit" target="_blank">View My GitHub →</a>
        <p class="footer">Built & deployed on AWS S3 · 2026</p>
    </div>
</body>
</html>
